      function gtag(){window.dataLayer.push(arguments);}

    <meta charset="UTF-8" />
    <!-- Theme blocking script: prevent FART (flash of inaccurate theme) -->
    <script>
      (function() {
        var theme = localStorage.getItem("solomind_theme");
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <!-- Critical CSS: prevent FOUC before Tailwind CSS loads -->
    <style>
      :root {
        color-scheme: light;
      }
      :root.dark {
        color-scheme: dark;
      }
      body {
        background-color: oklch(0.9582 0.0152 90.2357);
        color: oklch(0.21 0.01 0);
      }
      .dark body {
        background-color: oklch(0.19 0.006 65);
        color: oklch(0.97 0.004 85);
      }
      #seo-prerender-content {
        font-family: Georgia, serif;
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1rem;
        line-height: 1.6;
      }
      #seo-prerender-content h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      #seo-prerender-content h2 {
        font-size: 1.25rem;
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
      }
      #seo-prerender-content a {
        color: oklch(0.38 0.05 65.5444);
      }
      .dark #seo-prerender-content a {
        color: oklch(0.75 0.06 70);
      }
      #root {
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      #root.root-ready {
        opacity: 1;
      }
    </style>

    <meta

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"

      /* Custom Scrollbar for Vintage feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted-foreground);
        border: 2px solid transparent;
        background-clip: content-box;
      }
    </style>
